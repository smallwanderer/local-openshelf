name: openshelf-dev

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: db-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6378:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "0"
        INSTALL_DEV_DEPS: "1"
    container_name: app-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    expose:
      - "8000"
    command: [ "bash", "-lc", "python manage.py runserver 0.0.0.0:8000" ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/files/healthcheck/')" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 60s

  celery-core-worker:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "1"
        INSTALL_DEV_DEPS: "1"
    container_name: celery-core-worker-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config worker -l info -Q parse,embed --concurrency=$${DOCUMENT_AI_WORKER_CONCURRENCY:-1} --prefetch-multiplier=1" ]

  celery-search-worker:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "1"
        INSTALL_DEV_DEPS: "1"
    container_name: celery-search-worker-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config worker -l info -Q search --concurrency=$${SEARCH_WORKER_CONCURRENCY:-1} --prefetch-multiplier=1" ]

  celery-query-worker:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "0"
        INSTALL_DEV_DEPS: "1"
    container_name: celery-query-worker-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      llm-parser:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config worker -l info -Q query --concurrency=$${QUERY_WORKER_CONCURRENCY:-1} --prefetch-multiplier=1" ]

  celery-text2sql-worker:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "0"
        INSTALL_DEV_DEPS: "1"
    container_name: celery-text2sql-worker-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      llm-parser:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config worker -l info -Q text2sql --concurrency=$${TEXT2SQL_WORKER_CONCURRENCY:-1} --prefetch-multiplier=1" ]

  celery-llm-rag-worker:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "0"
        INSTALL_DEV_DEPS: "1"
    container_name: celery-llm-rag-worker-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      llm-parser:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config worker -l info -Q rag --concurrency=$${RAG_WORKER_CONCURRENCY:-1} --prefetch-multiplier=1" ]

  celery-beat:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "0"
        INSTALL_DEV_DEPS: "1"
    container_name: celery-beat-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./app:/app
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config beat -l info" ]

  nginx:
    image: nginx:stable
    container_name: nginx-dev
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/uploads:/var/www/uploads:ro
    depends_on:
      app:
        condition: service_started

  llm-parser:
    build:
      context: ./llama-cpp-parser
      dockerfile: Dockerfile
    container_name: llm-parser-dev
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - .env.dev
    volumes:
      - ./llama-cpp-parser/data/cache:/root/.cache
    command: >
      --hf-repo ggml-org/gemma-4-E4B-it-GGUF:Q4_K_M --host 0.0.0.0 --port 8080 --threads 8 --ctx-size 4096 --parallel 2 --metrics --reasoning auto --reasoning-budget 64
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
