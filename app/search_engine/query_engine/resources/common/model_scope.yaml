# Based on Openshelf Models

node:
  model: files.Node
  fields: [uid, name, ext, node_type, description, path, starred, trashed, deleted_at, created_at, updated_at, owner]

fileblob:
  model: files.FileBlob
  fields: [status, sha256, size, mime_type]

parse_result:
  model: document_ai.DocumentParseResult
  fields: [parser_name, status, chunk_count, metadata, created_at, updated_at]

chunk:
  model: document_ai.DocumentChunk
  fields: [chunk_index, text, page_from, page_to, status, created_at, updated_at]

embedding:
  model: document_ai.ChunkEmbedding
  fields: [model_name, model_version, vector, sparse_vector, status, embedded_at]

user:
  model: accounts.User
  fields: [email, is_active, is_staff, email_verified, created_at]

user_storage:
  model: files.UserStorage
  fields: [total_size, used_size]
