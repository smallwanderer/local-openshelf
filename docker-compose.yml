name: openshelf

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: db
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "0"
    container_name: app
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/staticfiles:/app/staticfiles
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    expose:
      - "8000"
    command: >
      bash -lc "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/files/healthcheck/')" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 60s

  celery-core-worker:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "1"
    container_name: celery-core-worker
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config worker -l info -Q parse,embed --concurrency=$${DOCUMENT_AI_WORKER_CONCURRENCY:-1} --prefetch-multiplier=1" ]

  celery-search-worker:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "1"
    container_name: celery-search-worker
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config worker -l info -Q search --concurrency=$${SEARCH_WORKER_CONCURRENCY:-1} --prefetch-multiplier=1" ]

  celery-text2sql-worker:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "0"
    container_name: celery-text2sql-worker
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      llm-parser:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config worker -l info -Q text2sql --concurrency=$${TEXT2SQL_WORKER_CONCURRENCY:-1} --prefetch-multiplier=1" ]

  celery-beat:
    build:
      context: ./app
      args:
        INSTALL_AI_DEPS: "0"
    container_name: celery-beat
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/logs:/data/logs
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: [ "bash", "-lc", "celery -A config beat -l info" ]

  nginx:
    image: nginx:stable
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/uploads:/var/www/uploads:ro
      - ./data/staticfiles:/var/www/staticfiles:ro
    depends_on:
      app:
        condition: service_started

  llm-parser:
    build:
      context: ./llama-cpp-parser
      dockerfile: Dockerfile
    container_name: llm-parser
    restart: always
    expose:
      - "8080"
    env_file:
      - .env
    volumes:
      - ./llama-cpp-parser/data/cache:/root/.cache
    command: >
      --hf-repo ggml-org/gemma-4-E4B-it-GGUF:Q4_K_M --host 0.0.0.0 --port 8080 --threads 8 --ctx-size 4096 --parallel 1 --metrics
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
