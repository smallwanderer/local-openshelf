[pytest]
DJANGO_SETTINGS_MODULE = config.settings
testpaths = app/tests app/files
pythonpath = app
python_files = tests.py test_*.py *_test.py
addopts = -p no:cacheprovider
markers =
    unit: fast tests that validate isolated logic without external services
    integration: tests that depend on real parser/model integration
    manual: scripts intended for manual execution only
